<!DOCTYPE html>
<html>
<head>
  <title>Tile acceptance calculator (Pyodide)</title>
</head>
<body>
  <pre id="formatTips" hidden>
  1-9s = bamboos
  1-9m = characters
  1-9p = circles
  1234z = East - South - West - North
  567z = White - Green - Red Dragon
  (234)m = exposed element
  (4444)z = exposed kong
  [4444]z = concealed kong
  Example of valid format: 146(789)m[3333](4444)p14z
  </pre>
  <button id="tipsBtn">Format Help</button>
  <input id="textInput" placeholder="Enter hand" type="text">
  <button id="calcBtn" disabled>Calculate</button>
  <br>
  <label><select id="prevalent_wind">
    <option value="1">East</option>
    <option value="2">South</option>
    <option value="3">West</option>
    <option value="4">North</option>
  </select> Prevalent Wind</label>
  <br>
  <label><select id="seat_wind">
    <option value="1">East</option>
    <option value="2">South</option>
    <option value="3">West</option>
    <option value="4">North</option>
  </select> Seat Wind</label>
  <br>
  <label><input id="checkBox" type="checkbox"> Display all results</label>
  <pre id="result"></pre>

  <script>
    const tipsBtn = document.getElementById("tipsBtn");
    const formatTips = document.getElementById("formatTips");

    tipsBtn.addEventListener("click", () => {
      formatTips.hidden = !formatTips.hidden;
      tipsBtn.textContent = formatTips.hidden ? "Format Help" : "Hide Help";
    });
  </script>
  <script src="https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js"></script>
  <script>
    async function init() {
      const pyodide = await loadPyodide();
      const pyFiles = ['tile_acceptance_calculator.py','tiles_utils.py', 'acceptance.py',
        'pattern_generator.py','group_finder.py','mahjong_objects.py','mcr_scorer.py',
        'hand_types/__init__.py','hand_types/all_pungs.py','hand_types/all_types.py','hand_types/common.py','hand_types/basic.py',
        'hand_types/knitted.py','hand_types/precompute.py','hand_types/seven_pairs.py','hand_types/three_group_pattern.py'];
      const base = './';
      for (const f of pyFiles) {
        if (f.includes('/')) {
          try { pyodide.FS.mkdirTree('/home/pyodide/' + f.substring(0, f.lastIndexOf('/'))); } catch(e) {}
        }
        const resp = await fetch(base + f);
        const text = await resp.text();
        pyodide.FS.writeFile('/home/pyodide/' + f, text);
      }
      await pyodide.runPythonAsync("import sys\nsys.path.append('/home/pyodide')");
      window.pyodide = pyodide;
      document.getElementById('calcBtn').disabled = false;
    }
    init();

    async function sendData() {
      const input = document.getElementById("textInput").value;
      const checkbox = document.getElementById("checkBox").checked;
      const prevalent_wind = Number(document.getElementById("prevalent_wind").value);
      const seat_wind = Number(document.getElementById("seat_wind").value);
      const startTime = performance.now();
      try {
        pyodide.globals.set("user_input", input);
        pyodide.globals.set("display_all", checkbox);
        pyodide.globals.set("prevalent_wind", prevalent_wind);
        pyodide.globals.set("seat_wind", seat_wind);
        const result = await pyodide.runPythonAsync(`from tile_acceptance_calculator import analyze_hand_from_string_and_print\nresult = analyze_hand_from_string_and_print(user_input, display_all, prevalent_wind, seat_wind)\nresult`);
        const endTime = performance.now();
        const duration = ((endTime - startTime)/1000).toFixed(2);
        document.getElementById("result").innerText = `Analysis took ${duration} seconds\n\n${result}`;
      } catch (err) {
        document.getElementById("result").innerText = "Error: " + err;
      }
    }
    document.getElementById('calcBtn').addEventListener('click', sendData);
  </script>
</body>
</html>
